<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth or Dare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0e17;
      color: #fffffe;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    h1 { font-size: 28px; font-weight: 700; margin-bottom: 0.4rem; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 1rem; color: #fffffe; }
    p  { font-size: 15px; color: #a7a9be; line-height: 1.7; }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      background: #0f0e17;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #fffffe;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #7F77DD; }
    input[type="text"]::placeholder { color: #555577; }

    .btn {
      display: inline-block;
      padding: 11px 22px;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      background: transparent;
      color: #fffffe;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #1a1a2e; }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #7F77DD;
      border-color: #7F77DD;
      color: #fff;
      font-weight: 600;
    }
    .btn-primary:hover { background: #534AB7; border-color: #534AB7; }

    .btn-pink {
      background: #D4537E;
      border-color: #D4537E;
      color: #fff;
      font-weight: 600;
    }
    .btn-pink:hover { background: #993556; border-color: #993556; }

    .btn-block { width: 100%; text-align: center; }

    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag-truth { background: #2e2a5e; color: #b0aaf5; }
    .tag-dare  { background: #3e1a2e; color: #f5a0c0; }
    .tag-room  { background: #1a3e2e; color: #5DCAA5; }

    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: #fffffe;
      margin: 3px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #5DCAA5; display: inline-block; }

    .code-display {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #7F77DD;
      text-align: center;
      padding: 1.2rem;
      background: #12102a;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    #spin-canvas { display: block; margin: 0 auto 0.75rem; }

    .chosen-label {
      font-size: 18px;
      font-weight: 600;
      color: #b0aaf5;
      text-align: center;
      margin-bottom: 1rem;
      min-height: 28px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .qcard {
      border-left: 3px solid #7F77DD;
      padding: 1rem;
      background: #12102a;
      border-radius: 0 12px 12px 0;
      margin-bottom: 1rem;
    }
    .qcard.dare { border-left-color: #D4537E; background: #1e0f18; }
    .qcard p { color: #fffffe; font-size: 16px; margin-top: 8px; }

    .chat-box {
      height: 200px;
      overflow-y: auto;
      background: #12102a;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

    .msg { margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
    .msg-name { font-weight: 600; color: #b0aaf5; margin-right: 6px; }
    .msg-text { color: #a7a9be; }
    .msg-system { color: #555577; font-style: italic; font-size: 13px; }

    .chat-row { display: flex; gap: 8px; }
    .chat-row input { flex: 1; margin-bottom: 0; }

    .divider { height: 1px; background: #2a2a4a; margin: 1rem 0; }

    .row { display: flex; gap: 10px; align-items: center; }
    .col { display: flex; flex-direction: column; gap: 10px; }

    .or-divider {
      text-align: center;
      color: #555577;
      font-size: 13px;
      padding: 0.25rem 0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 6px;
    }

    @media (max-width: 400px) {
      h1 { font-size: 22px; }
      .code-display { font-size: 26px; letter-spacing: 6px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- LOBBY -->
  <div class="screen active" id="screen-lobby">
    <div style="text-align:center; margin-bottom:1.5rem; padding-top:1rem;">
      <div style="font-size:48px; margin-bottom:0.5rem;">🍾</div>
      <h1>Truth or Dare</h1>
      <p>Spin the bottle with friends — no login needed</p>
    </div>
    <div class="col">
      <div class="card">
        <h2>Create a room</h2>
        <input type="text" id="create-name" placeholder="Your name" />
        <button class="btn btn-primary btn-block" onclick="createRoom()">Create room</button>
      </div>
      <div class="or-divider">— or —</div>
      <div class="card">
        <h2>Join a room</h2>
        <input type="text" id="join-name" placeholder="Your name" />
        <input type="text" id="join-code" placeholder="Room code (e.g. ROSE7)" style="text-transform:uppercase;" />
        <button class="btn btn-pink btn-block" onclick="joinRoom()">Join room</button>
      </div>
    </div>
  </div>

  <!-- WAITING -->
  <div class="screen" id="screen-waiting">
    <div style="text-align:center; margin-bottom:1rem; padding-top:1rem;">
      <div style="font-size:32px; margin-bottom:0.5rem;">🎉</div>
      <h1>Waiting for players…</h1>
      <p>Share the code below with your friends</p>
    </div>
    <div class="code-display" id="display-code">----</div>
    <div class="card">
      <p style="font-size:13px; font-weight:600; color:#a7a9be; margin-bottom:10px;">Players in room</p>
      <div id="player-list"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="startGame()">Start game</button>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="top-bar">
      <span class="tag tag-room" id="room-code-tag"></span>
      <div id="players-chips"></div>
    </div>

    <canvas id="spin-canvas" width="220" height="220"></canvas>
    <div class="chosen-label" id="chosen-name"></div>

    <div class="action-row">
      <button class="btn" onclick="spin()">🔄 Spin</button>
      <button class="btn" style="background:#2e2a5e; border-color:#534AB7; color:#b0aaf5;" onclick="drawCard('truth')">Truth</button>
      <button class="btn" style="background:#3e1a2e; border-color:#993556; color:#f5a0c0;" onclick="drawCard('dare')">Dare</button>
    </div>

    <div id="question-card" style="display:none;"></div>

    <div class="divider"></div>
    <p style="font-size:13px; font-weight:600; color:#a7a9be; margin-bottom:8px;">Room chat</p>
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-row">
      <input type="text" id="msg-input" placeholder="Type a message or answer…" onkeydown="if(event.key==='Enter') sendMsg()" />
      <button class="btn btn-primary" onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>

<script>
const TRUTHS = [
  "What's the most embarrassing thing you've ever done on a date?",
  "Have you ever had a crush on someone in this room?",
  "What's your biggest relationship dealbreaker?",
  "Have you ever stalked an ex on social media?",
  "What's the most romantic thing you've secretly done?",
  "What's a lie you've told your partner or best friend?",
  "What's your biggest fear in a relationship?",
  "Have you ever fallen for someone you shouldn't have?",
  "What's one thing you've never told anyone in this room?",
  "Who was your first love and what happened?",
  "What's your most embarrassing text you've sent to the wrong person?",
  "What's the wildest thing you've done to impress someone?",
  "If you could date any celebrity, who and why?",
  "What's something you find secretly attractive?",
  "Have you ever kissed someone on a dare?",
  "What's the most childish thing you still do?",
  "Have you ever lied to get out of plans?",
  "What's your guilty pleasure that no one knows about?",
  "What's the most awkward situation you've been in with a crush?",
  "If your best friend read your texts, what would surprise them most?",
];

const DARES = [
  "Give the person to your left a 10-second compliment without stopping.",
  "Text your crush 'thinking of you' right now.",
  "Do your best impression of someone in the room.",
  "Send a flirty message to the last person in your DMs.",
  "Say something sweet to each person in the room, one by one.",
  "Let someone go through your recent Instagram likes for 10 seconds.",
  "Speak in an accent for the next 2 rounds.",
  "Call someone you haven't talked to in over a month right now.",
  "Do a dramatic reading of your last sent text message.",
  "Dance for 30 seconds — no music.",
  "Whisper a secret to the person across from you.",
  "Give someone in the room a nickname based on their personality.",
  "Let the room read your most recent 3 texts.",
  "Say something you've always wanted to say in this room.",
  "Stare into the eyes of the person next to you for 30 seconds without laughing.",
  "Show the last 5 photos in your camera roll.",
  "Sing the first 10 seconds of your favorite song out loud.",
  "Write a poem about the person to your right in 60 seconds.",
  "Do your best catwalk across the room.",
  "Let the group pick a new profile picture for you for the next hour.",
];

let state = {
  roomCode: '',
  myName: '',
  players: [],
  messages: [],
  spinning: false,
  chosenPlayer: null,
};

let spinAngle = 0;

function randCode() {
  const words = ['ROSE','KISS','LOVE','BOLD','FIRE','GLOW','MOON','STAR','WILD','PINK'];
  return words[Math.floor(Math.random() * words.length)] + Math.floor(Math.random() * 10);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function createRoom() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) { alert('Enter your name first!'); return; }
  state.myName = name;
  state.roomCode = randCode();
  state.players = [name];
  document.getElementById('display-code').textContent = state.roomCode;
  renderPlayers();
  showScreen('screen-waiting');
  simulateFriendJoin();
}

function joinRoom() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name) { alert('Enter your name!'); return; }
  if (!code) { alert('Enter a room code!'); return; }
  state.myName = name;
  state.roomCode = code;
  state.players = ['Host', name, 'Alex', 'Sam'];
  document.getElementById('display-code').textContent = code;
  renderPlayers();
  showScreen('screen-waiting');
}

function simulateFriendJoin() {
  const demo = ['Alex', 'Sam', 'Jamie', 'Jordan'];
  let i = 0;
  const iv = setInterval(() => {
    if (i >= demo.length) { clearInterval(iv); return; }
    state.players.push(demo[i++]);
    renderPlayers();
  }, 1800);
}

function renderPlayers() {
  document.getElementById('player-list').innerHTML =
    state.players.map(p => `<span class="player-chip"><span class="dot"></span>${p}</span>`).join('');
}

function startGame() {
  if (state.players.length < 2) { alert('Need at least 2 players!'); return; }
  document.getElementById('room-code-tag').textContent = 'Room: ' + state.roomCode;
  renderPlayerChips();
  addMsg('system', null, '-- Game started! Spin the bottle to pick who goes first. --');
  showScreen('screen-game');
  drawBottle();
}

function renderPlayerChips() {
  document.getElementById('players-chips').innerHTML =
    state.players.map(p => `<span class="player-chip"><span class="dot"></span>${p}</span>`).join('');
}

function drawBottle(angle) {
  const canvas = document.getElementById('spin-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 110, cy = 110, r = 95;
  const a = angle !== undefined ? angle : spinAngle;
  const n = state.players.length || 4;
  const colors = ['#7F77DD','#D4537E','#1D9E75','#EF9F27','#378ADD','#D85A30','#9E1D75','#5DCAA5'];

  ctx.clearRect(0, 0, 220, 220);

  for (let i = 0; i < n; i++) {
    const start = (2 * Math.PI / n) * i - Math.PI / 2;
    const end = start + 2 * Math.PI / n;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.fillStyle = colors[i % colors.length] + '44';
    ctx.fill();
    ctx.strokeStyle = colors[i % colors.length] + 'aa';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const mid = (start + end) / 2;
    const tx = cx + Math.cos(mid) * 62;
    const ty = cy + Math.sin(mid) * 62;
    ctx.save();
    ctx.translate(tx, ty);
    ctx.fillStyle = '#fffffe';
    ctx.font = '600 12px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText((state.players[i] || 'P' + (i + 1)).slice(0, 7), 0, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 16, 0, 2 * Math.PI);
  ctx.fillStyle = '#0f0e17';
  ctx.fill();
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const bx = cx + Math.cos(a) * 82;
  const by = cy + Math.sin(a) * 82;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(bx, by);
  ctx.strokeStyle = '#7F77DD';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(bx, by, 8, 0, 2 * Math.PI);
  ctx.fillStyle = '#7F77DD';
  ctx.fill();
}

function spin() {
  if (state.spinning) return;
  state.spinning = true;
  document.getElementById('chosen-name').textContent = '';
  document.getElementById('question-card').style.display = 'none';

  const totalSpin = Math.PI * 2 * (6 + Math.random() * 6);
  const duration = 3500;
  const startTime = performance.now();
  const startAngle = spinAngle;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);
    spinAngle = startAngle + totalSpin * ease;
    drawBottle(spinAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      state.spinning = false;
      const n = state.players.length;
      const norm = ((spinAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      const idx = Math.floor(((norm + Math.PI / 2) % (2 * Math.PI)) / (2 * Math.PI / n)) % n;
      state.chosenPlayer = state.players[idx];
      document.getElementById('chosen-name').textContent = state.chosenPlayer + "'s turn!";
      addMsg('system', null, '-- Bottle landed on ' + state.chosenPlayer + '! --');
    }
  }
  requestAnimationFrame(animate);
}

function drawCard(type) {
  const pool = type === 'truth' ? TRUTHS : DARES;
  const q = pool[Math.floor(Math.random() * pool.length)];
  const card = document.getElementById('question-card');
  card.style.display = 'block';
  card.innerHTML = `
    <div class="qcard ${type}">
      <span class="tag tag-${type}">${type === 'truth' ? 'Truth' : 'Dare'}</span>
      <p>${q}</p>
    </div>`;
  const who = state.chosenPlayer || state.myName;
  addMsg('system', null, `-- ${who} picked ${type.toUpperCase()}: "${q}" --`);
}

function addMsg(type, name, text) {
  state.messages.push({ type, name, text });
  renderChat();
}

function renderChat() {
  const box = document.getElementById('chat-box');
  box.innerHTML = state.messages.map(m => {
    if (m.type === 'system') return `<div class="msg"><span class="msg-system">${m.text}</span></div>`;
    return `<div class="msg"><span class="msg-name">${m.name}</span><span class="msg-text">${m.text}</span></div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  addMsg('user', state.myName, text);
  input.value = '';
  setTimeout(() => simulateReply(), 800 + Math.random() * 1200);
}

function simulateReply() {
  const others = state.players.filter(p => p !== state.myName);
  if (!others.length) return;
  const responder = others[Math.floor(Math.random() * others.length)];
  const replies = [
    'Haha no way!', 'Okay okay fine...', 'I plead the fifth!',
    "You didn't just say that 😂", 'Same honestly', "That's bold!",
    'I knew it!', 'My turn next!', 'This game is too good',
    'For real though...', 'Challenge accepted!', 'No comment 😅',
  ];
  addMsg('user', responder, replies[Math.floor(Math.random() * replies.length)]);
}

drawBottle(spinAngle);
</script>
</body>
</html>

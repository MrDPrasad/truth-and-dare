<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth or Dare 🍾</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#0f0e17',
            surface: '#1a1a2e',
            border:  '#2a2a4a',
            muted:   '#a7a9be',
            hint:    '#444466',
            purple:  { DEFAULT:'#7F77DD', dark:'#534AB7', light:'#b0aaf5', bg:'#2e2a5e' },
            pink:    { DEFAULT:'#D4537E', dark:'#993556', light:'#f5a0c0', bg:'#3e1a2e' },
            green:   { DEFAULT:'#5DCAA5', bg:'#0d2018', border:'#1a3e2e' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f0e17; color: #fffffe; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    input::placeholder { color: #444466; }
    input:focus { outline: none; border-color: #7F77DD; }
    #spin-canvas { display: block; margin: 0 auto; }
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen flex items-start justify-center px-4 py-10">
<div class="w-full max-w-md pb-16">

  <!-- ═══════════ LOBBY ═══════════ -->
  <div class="screen active" id="screen-lobby">
    <div class="text-center mb-8">
      <div class="text-6xl mb-2">🍾</div>
      <h1 class="text-3xl font-bold mb-1">Truth or Dare</h1>
      <p class="text-muted text-sm">Real multiplayer · No login needed</p>
    </div>

    <!-- Create -->
    <div class="bg-surface border border-border rounded-2xl p-5 mb-3">
      <h2 class="text-lg font-semibold mb-4">Create a room</h2>
      <input id="create-name" type="text" maxlength="16" placeholder="Your name"
        class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-sm text-white mb-3" />
      <button onclick="createRoom()"
        class="w-full bg-purple text-white font-semibold rounded-xl py-3 text-sm hover:bg-purple-dark transition">
        Create room
      </button>
    </div>

    <div class="text-center text-hint text-xs my-3">— or —</div>

    <!-- Join -->
    <div class="bg-surface border border-border rounded-2xl p-5" id="join-card">
      <h2 class="text-lg font-semibold mb-4">Join a room</h2>
      <input id="join-name" type="text" maxlength="16" placeholder="Your name"
        class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-sm text-white mb-3" />
      <input id="join-code" type="text" maxlength="10" placeholder="Room code (e.g. ROSE7)"
        oninput="this.value=this.value.toUpperCase()"
        class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-sm text-white mb-3" />
      <button onclick="joinRoom()"
        class="w-full bg-pink text-white font-semibold rounded-xl py-3 text-sm hover:bg-pink-dark transition">
        Join room
      </button>
    </div>
  </div>

  <!-- ═══════════ WAITING ═══════════ -->
  <div class="screen" id="screen-waiting">
    <div class="text-center mb-6 pt-2">
      <div class="text-4xl mb-2">🎉</div>
      <h1 class="text-2xl font-bold mb-1">Waiting for players…</h1>
      <p class="text-muted text-sm">Share the code below with your friends</p>
    </div>

    <!-- Room code -->
    <div class="bg-surface border border-border rounded-2xl p-5 text-center mb-3">
      <p class="text-xs text-muted mb-2 uppercase tracking-widest">Room Code</p>
      <div id="display-code" class="text-4xl font-bold tracking-[10px] text-purple mb-3">----</div>
      <button onclick="copyLink()" class="text-purple-light text-xs underline cursor-pointer bg-transparent border-none">
        📋 Copy invite link
      </button>
    </div>

    <!-- Status -->
    <div class="text-center mb-3">
      <span id="status-pill" class="text-xs px-3 py-1 rounded-full bg-surface border border-border text-hint">
        Connecting…
      </span>
    </div>

    <!-- Players -->
    <div class="bg-surface border border-border rounded-2xl p-5 mb-3">
      <p class="text-xs font-semibold text-muted mb-3 uppercase tracking-widest">Players in room</p>
      <div id="player-list" class="flex flex-wrap gap-2"></div>
    </div>

    <button onclick="broadcastStart()"
      class="w-full bg-purple text-white font-semibold rounded-xl py-3 text-sm hover:bg-purple-dark transition">
      Start game
    </button>
    <p class="text-center text-hint text-xs mt-2">Everyone's screen updates at the same time.</p>
  </div>

  <!-- ═══════════ GAME ═══════════ -->
  <div class="screen" id="screen-game">
    <!-- Top bar -->
    <div class="flex items-center justify-between mb-3">
      <span id="room-code-tag"
        class="text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full bg-green-bg border border-green-border text-green">
      </span>
      <span id="status-pill-game"
        class="text-xs px-3 py-1 rounded-full bg-green-bg border border-green-border text-green">
        ● Connected
      </span>
    </div>

    <!-- Player chips -->
    <div id="players-chips" class="flex flex-wrap gap-2 mb-4"></div>

    <!-- Bottle canvas -->
    <canvas id="spin-canvas" width="220" height="220" class="mb-2"></canvas>

    <!-- Chosen -->
    <div id="chosen-name" class="text-center text-purple-light font-semibold text-lg mb-4 min-h-[28px]"></div>

    <!-- Actions -->
    <div class="flex gap-3 justify-center flex-wrap mb-4">
      <button onclick="broadcastSpin()"
        class="border border-border rounded-xl px-5 py-2.5 text-sm hover:bg-surface transition">
        🔄 Spin
      </button>
      <button onclick="broadcastCard('truth')"
        class="bg-purple-bg border border-purple text-purple-light rounded-xl px-5 py-2.5 text-sm hover:opacity-80 transition">
        Truth
      </button>
      <button onclick="broadcastCard('dare')"
        class="bg-pink-bg border border-pink text-pink-light rounded-xl px-5 py-2.5 text-sm hover:opacity-80 transition">
        Dare
      </button>
    </div>

    <!-- Question card -->
    <div id="question-card" class="hidden mb-4"></div>

    <!-- Chat -->
    <div class="border-t border-border pt-4">
      <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-3">Room chat</p>
      <div id="chat-box" class="chat-box h-48 overflow-y-auto bg-surface rounded-xl p-3 mb-3 space-y-2"></div>
      <div class="flex gap-2">
        <input id="msg-input" type="text" maxlength="200" placeholder="Type a message or answer…"
          onkeydown="if(event.key==='Enter')sendMsg()"
          class="flex-1 bg-bg border border-border rounded-xl px-4 py-2.5 text-sm text-white" />
        <button onclick="sendMsg()"
          class="bg-purple text-white font-semibold rounded-xl px-4 py-2.5 text-sm hover:bg-purple-dark transition">
          Send
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Firebase SDKs (compat version — works in plain HTML, no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
/* ══════════════════════════════════════
   FIREBASE INIT
══════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyBFVlktJ3vSBxRsLRY_3CPBPX6UKH6g5Uo",
  authDomain:        "truth-dare-app-95ce8.firebaseapp.com",
  databaseURL:       "https://truth-dare-app-95ce8-default-rtdb.firebaseio.com",
  projectId:         "truth-dare-app-95ce8",
  storageBucket:     "truth-dare-app-95ce8.firebasestorage.app",
  messagingSenderId: "698378458947",
  appId:             "1:698378458947:web:aa6dcb626803205c1701f6",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ══════════════════════════════════════
   QUESTIONS
══════════════════════════════════════ */
const TRUTHS = [
  "What's the most embarrassing thing you've done on a date?",
  "Have you ever had a crush on someone in this room?",
  "What's your biggest relationship dealbreaker?",
  "Have you ever stalked an ex on social media?",
  "What's the most romantic thing you've secretly done?",
  "What's a lie you've told your partner or best friend?",
  "What's your biggest fear in a relationship?",
  "Have you ever fallen for someone you shouldn't have?",
  "What's one thing you've never told anyone in this room?",
  "Who was your first love and what happened?",
  "What's the most embarrassing text you sent to the wrong person?",
  "What's the wildest thing you've done to impress someone?",
  "If you could date any celebrity, who and why?",
  "What's something you secretly find attractive?",
  "Have you ever kissed someone on a dare?",
  "What's the most childish thing you still do?",
  "Have you ever lied to get out of plans?",
  "What's your guilty pleasure no one knows about?",
  "What's the most awkward moment you've had with a crush?",
  "If your best friend read your texts, what would surprise them?",
  "What's the most jealous you've ever been?",
  "What's the worst date you've been on?",
  "What do you find most attractive in a person?",
  "Have you ever sent a risky text and immediately regretted it?",
  "What's something you've never admitted to anyone here?",
];
const DARES = [
  "Give the person to your left a 10-second compliment without stopping.",
  "Text your crush 'thinking of you' right now.",
  "Do your best impression of someone in the room.",
  "Send a flirty message to the last person in your DMs.",
  "Say something sweet to each person in the room, one by one.",
  "Let someone go through your recent Instagram likes for 10 seconds.",
  "Speak in an accent for the next 2 rounds.",
  "Call someone you haven't talked to in over a month.",
  "Do a dramatic reading of your last sent text message out loud.",
  "Dance for 30 seconds with no music.",
  "Whisper a secret to the person across from you.",
  "Give someone in the room a nickname based on their personality.",
  "Let the room read your most recent 3 texts.",
  "Say something you've always wanted to say in this room.",
  "Stare into the eyes of the person next to you for 30 seconds without laughing.",
  "Show the last 5 photos in your camera roll.",
  "Sing the chorus of your favourite song out loud.",
  "Write a poem about the person to your right in 60 seconds.",
  "Let the group pick your profile picture for the next hour.",
  "Do your best catwalk across the room.",
  "Say three genuine things you like about the person across from you.",
  "Let the room ask you one question you must answer honestly.",
  "Act out your most embarrassing moment without speaking.",
  "Send a voice note to any contact saying 'I miss you' — right now.",
  "Recreate your best selfie pose right now.",
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let myName       = '';
let roomCode     = '';
let myId         = 'p_' + Math.random().toString(36).slice(2, 9);
let roomRef      = null;  // db reference to this room
let spinAngle    = 0;
let spinning     = false;
let chosenPlayer = null;
let listeners    = [];    // keep track so we can detach on leave

/* ══════════════════════════════════════
   FIREBASE ROOM HELPERS
══════════════════════════════════════ */
function getRoomRef(code) {
  return db.ref('rooms/' + code);
}

function joinFirebaseRoom() {
  roomRef = getRoomRef(roomCode);

  // Write myself into the players list
  roomRef.child('players/' + myId).set({ name: myName, id: myId });

  // Remove myself when I disconnect
  roomRef.child('players/' + myId).onDisconnect().remove();

  // Listen for player list changes
  const playersRef = roomRef.child('players');
  playersRef.on('value', snap => {
    const data = snap.val() || {};
    // Rebuild players map { id: name }
    const newPlayers = {};
    Object.values(data).forEach(p => { newPlayers[p.id] = p.name; });
    players = newPlayers;
    renderPlayers();
  });
  listeners.push(() => playersRef.off());

  // Listen for game events
  const eventsRef = roomRef.child('events');
  eventsRef.limitToLast(1).on('child_added', snap => {
    const event = snap.val();
    if (!event || event._from === myId) return; // ignore own events
    handleEvent(event);
  });
  listeners.push(() => eventsRef.off());

  // Listen for game state (started)
  const stateRef = roomRef.child('state');
  stateRef.on('value', snap => {
    const state = snap.val();
    if (state && state.started && getCurrentScreen() === 'screen-waiting') {
      players = state.players || players;
      startGameLocal();
    }
  });
  listeners.push(() => stateRef.off());

  setStatus('● Connected', 'ok');
}

function pushEvent(eventData) {
  if (!roomRef) return;
  roomRef.child('events').push({ ...eventData, _from: myId, _ts: Date.now() });
}

function getCurrentScreen() {
  const el = document.querySelector('.screen.active');
  return el ? el.id : '';
}

/* ══════════════════════════════════════
   EVENT HANDLER (from other players)
══════════════════════════════════════ */
function handleEvent(event) {
  switch (event.type) {
    case 'chat':
      addMsg('user', event.name, event.text);
      break;
    case 'spin':
      animateSpin(event.seed);
      break;
    case 'chosen':
      chosenPlayer = event.player;
      document.getElementById('chosen-name').textContent = event.player + "'s turn!";
      addMsg('system', null, '🍾 Bottle landed on ' + event.player + '!');
      break;
    case 'card':
      showCard(event.cardType, event.question);
      addMsg('system', null, event.who + ' picked ' + event.cardType.toUpperCase() + ': "' + event.question + '"');
      break;
  }
}

/* ══════════════════════════════════════
   LOBBY ACTIONS
══════════════════════════════════════ */
let players = {};

function randCode() {
  const w = ['ROSE','KISS','LOVE','BOLD','FIRE','GLOW','MOON','STAR','WILD','PINK','RUSH','VIBE'];
  return w[Math.floor(Math.random() * w.length)] + Math.floor(Math.random() * 9 + 1);
}

function createRoom() {
  const n = document.getElementById('create-name').value.trim();
  if (!n) { alert('Enter your name!'); return; }
  myName   = n;
  roomCode = randCode();
  document.getElementById('display-code').textContent = roomCode;
  showScreen('screen-waiting');
  joinFirebaseRoom();
}

function joinRoom() {
  const n = document.getElementById('join-name').value.trim();
  const c = document.getElementById('join-code').value.trim().toUpperCase();
  if (!n) { alert('Enter your name!'); return; }
  if (!c) { alert('Enter a room code!'); return; }
  myName   = n;
  roomCode = c;
  document.getElementById('display-code').textContent = roomCode;
  showScreen('screen-waiting');
  joinFirebaseRoom();
}

function copyLink() {
  const url = window.location.href.split('?')[0] + '?room=' + roomCode;
  navigator.clipboard.writeText(url)
    .then(() => alert('✅ Link copied!\n\nFriends open it and the code fills automatically.\nCode: ' + roomCode))
    .catch(() => alert('Share this code: ' + roomCode));
}

// Auto-fill room code from URL param
window.addEventListener('DOMContentLoaded', () => {
  const r = new URLSearchParams(window.location.search).get('room');
  if (r) {
    document.getElementById('join-code').value = r.toUpperCase();
    document.getElementById('join-card').classList.add('border-purple');
    setTimeout(() => document.getElementById('join-card').scrollIntoView({ behavior: 'smooth' }), 150);
  }
  drawBottle(0, ['You']);
});

// Clean up on page close
window.addEventListener('beforeunload', () => {
  if (roomRef) roomRef.child('players/' + myId).remove();
  listeners.forEach(off => off());
});

/* ══════════════════════════════════════
   START GAME
══════════════════════════════════════ */
function broadcastStart() {
  if (Object.keys(players).length < 1) { alert('Waiting for players to join!'); return; }
  // Write game started state to Firebase — all clients pick it up
  roomRef.child('state').set({ started: true, players: { ...players } });
  players = { ...players };
  startGameLocal();
}

function startGameLocal() {
  document.getElementById('room-code-tag').textContent = 'Room: ' + roomCode;
  renderPlayers();
  addMsg('system', null, '-- Game started! Spin the bottle. --');
  showScreen('screen-game');
  drawBottle(spinAngle, Object.values(players));
}

/* ══════════════════════════════════════
   SPIN
══════════════════════════════════════ */
function broadcastSpin() {
  if (spinning) return;
  const seed = Math.random();
  pushEvent({ type: 'spin', seed });
  animateSpin(seed);
}

function animateSpin(seed) {
  if (spinning) return;
  spinning = true;
  document.getElementById('chosen-name').textContent = '';
  const qcard = document.getElementById('question-card');
  if (qcard) qcard.classList.add('hidden');

  const pl         = Object.values(players);
  const totalSpin  = Math.PI * 2 * (6 + seed * 6);
  const duration   = 3500;
  const t0         = performance.now();
  const startAngle = spinAngle;

  function frame(now) {
    const progress = Math.min((now - t0) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);
    spinAngle = startAngle + totalSpin * ease;
    drawBottle(spinAngle, pl);
    if (progress < 1) { requestAnimationFrame(frame); return; }

    spinning = false;
    const n    = pl.length || 1;
    const norm = ((spinAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    const idx  = Math.floor(((norm + Math.PI / 2) % (Math.PI * 2)) / (Math.PI * 2 / n)) % n;
    chosenPlayer = pl[idx];
    document.getElementById('chosen-name').textContent = chosenPlayer + "'s turn!";
    pushEvent({ type: 'chosen', player: chosenPlayer });
    addMsg('system', null, '🍾 Bottle landed on ' + chosenPlayer + '!');
  }
  requestAnimationFrame(frame);
}

/* ══════════════════════════════════════
   CARDS
══════════════════════════════════════ */
function broadcastCard(type) {
  const pool = type === 'truth' ? TRUTHS : DARES;
  const q    = pool[Math.floor(Math.random() * pool.length)];
  const who  = chosenPlayer || myName;
  pushEvent({ type: 'card', cardType: type, question: q, who });
  showCard(type, q);
  addMsg('system', null, who + ' picked ' + type.toUpperCase() + ': "' + q + '"');
}

function showCard(type, q) {
  const card = document.getElementById('question-card');
  card.classList.remove('hidden');
  const isTruth = type === 'truth';
  card.innerHTML = `
    <div class="border-l-4 ${isTruth ? 'border-purple bg-purple-bg' : 'border-pink bg-pink-bg'} rounded-r-2xl p-4">
      <span class="text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full
        ${isTruth ? 'bg-purple text-white' : 'bg-pink text-white'}">
        ${isTruth ? 'Truth' : 'Dare'}
      </span>
      <p class="mt-3 text-white text-base leading-relaxed">${q}</p>
    </div>`;
}

/* ══════════════════════════════════════
   CHAT
══════════════════════════════════════ */
function sendMsg() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;
  pushEvent({ type: 'chat', name: myName, text });
  addMsg('user', myName, text);
  input.value = '';
}

function addMsg(type, name, text) {
  const box = document.getElementById('chat-box');
  if (!box) return;
  const div = document.createElement('div');
  div.className = 'text-sm leading-snug';
  if (type === 'system') {
    div.innerHTML = `<span class="text-hint italic text-xs">${text}</span>`;
  } else {
    const isMe = name === myName;
    div.innerHTML = `<span class="font-semibold mr-1" style="color:${isMe ? '#5DCAA5' : '#b0aaf5'}">${name}</span><span class="text-muted">${text}</span>`;
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

/* ══════════════════════════════════════
   CANVAS — SPIN WHEEL
══════════════════════════════════════ */
function drawBottle(angle, pl) {
  const canvas = document.getElementById('spin-canvas');
  if (!canvas) return;
  const ctx  = canvas.getContext('2d');
  const list = pl && pl.length ? pl : Object.values(players).length ? Object.values(players) : ['?'];
  const cx = 110, cy = 110, r = 95;
  const a  = angle !== undefined ? angle : spinAngle;
  const n  = list.length;
  const colors = ['#7F77DD','#D4537E','#1D9E75','#EF9F27','#378ADD','#D85A30','#9E1D75','#5DCAA5'];

  ctx.clearRect(0, 0, 220, 220);

  for (let i = 0; i < n; i++) {
    const s = (2 * Math.PI / n) * i - Math.PI / 2;
    const e = s + 2 * Math.PI / n;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e);
    ctx.fillStyle   = colors[i % colors.length] + '55'; ctx.fill();
    ctx.strokeStyle = colors[i % colors.length] + 'cc'; ctx.lineWidth = 1.5; ctx.stroke();
    const mid = (s + e) / 2;
    ctx.save();
    ctx.translate(cx + Math.cos(mid) * 63, cy + Math.sin(mid) * 63);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(list[i].slice(0, 8), 0, 0);
    ctx.restore();
  }

  // Centre circle
  ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#0f0e17'; ctx.fill();
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 2; ctx.stroke();

  // Needle
  const bx = cx + Math.cos(a) * 82, by = cy + Math.sin(a) * 82;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(bx, by);
  ctx.strokeStyle = '#7F77DD'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(bx, by, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#7F77DD'; ctx.fill();
}

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function renderPlayers() {
  const names = Object.values(players);
  ['player-list','players-chips'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = names.map(name => `
      <span class="inline-flex items-center gap-2 bg-surface border border-border rounded-full px-3 py-1 text-xs text-white">
        <span class="w-2 h-2 rounded-full bg-green inline-block"></span>${name}
      </span>`).join('');
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setStatus(text, type) {
  ['status-pill','status-pill-game'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = `text-xs px-3 py-1 rounded-full border ${
      type === 'ok'
        ? 'bg-green-bg border-green-border text-green'
        : type === 'err'
        ? 'bg-pink-bg border-pink text-pink-light'
        : 'bg-surface border-border text-hint'
    }`;
    el.textContent = text;
  });
}
</script>
</body>
</html>
